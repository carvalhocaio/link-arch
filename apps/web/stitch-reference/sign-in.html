<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Geist+Mono&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "outline-variant": "#c0cab5",
              "inverse-surface": "#2f3131",
              "surface-tint": "#276c00",
              "surface-container-high": "#e8e8e8",
              "on-primary": "#ffffff",
              "surface-container": "#eeeeee",
              "secondary": "#5f5e61",
              "on-error-container": "#93000a",
              "tertiary-fixed-dim": "#c6c6c6",
              "error-container": "#ffdad6",
              "error": "#ba1a1a",
              "surface-container-highest": "#e2e2e2",
              "primary": "#276c00",
              "inverse-on-surface": "#f1f1f1",
              "secondary-container": "#e4e1e5",
              "on-primary-fixed-variant": "#1c5200",
              "surface": "#f9f9f9",
              "secondary-fixed-dim": "#c8c6c9",
              "surface-container-lowest": "#ffffff",
              "on-primary-fixed": "#072100",
              "surface-dim": "#dadada",
              "on-surface-variant": "#404a3a",
              "primary-fixed-dim": "#86db5d",
              "secondary-fixed": "#e4e1e5",
              "on-tertiary-fixed-variant": "#474747",
              "primary-fixed": "#a1f876",
              "on-secondary-fixed-variant": "#47464a",
              "on-error": "#ffffff",
              "background": "#f9f9f9",
              "surface-variant": "#e2e2e2",
              "surface-bright": "#f9f9f9",
              "on-primary-container": "#0e3100",
              "on-tertiary-fixed": "#1b1b1b",
              "on-tertiary": "#ffffff",
              "tertiary-container": "#919191",
              "on-tertiary-container": "#2a2a2a",
              "on-background": "#1a1c1c",
              "inverse-primary": "#86db5d",
              "primary-container": "#52a32b",
              "on-secondary": "#ffffff",
              "surface-container-low": "#f3f3f3",
              "tertiary-fixed": "#e2e2e2",
              "on-surface": "#1a1c1c",
              "tertiary": "#5e5e5e",
              "on-secondary-fixed": "#1b1b1e",
              "outline": "#707a68",
              "on-secondary-container": "#656467"
            },
            fontFamily: {
              "headline": ["Inter", "sans-serif"],
              "body": ["Inter", "sans-serif"],
              "label": ["Inter", "sans-serif"],
              "mono": ["Geist Mono", "monospace"]
            },
            borderRadius: {
              "DEFAULT": "0.125rem",
              "lg": "0.25rem",
              "xl": "0.5rem",
              "full": "0.75rem"
            },
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .ghost-border {
        border: 1px solid rgba(192, 202, 181, 0.15);
      }
    </style>
</head>
<body class="bg-surface text-on-surface font-body antialiased min-h-screen flex flex-col items-center justify-center">
<!-- Top Navigation Anchor -->
<header class="fixed top-0 w-full flex items-center justify-between px-6 py-8 max-w-7xl mx-auto w-full z-50">
<div class="text-xl font-bold tracking-tighter text-slate-900 dark:text-slate-50 font-headline">
            LinkArch
        </div>
<div class="flex items-center gap-6">
<a class="text-slate-500 hover:text-green-700 transition-colors font-sans antialiased text-sm tracking-tight" href="#">Support</a>
</div>
</header>
<!-- Main Content Stage -->
<main class="w-full max-w-md px-6 flex flex-col items-center">
<!-- Login Card -->
<div class="w-full glass-card ghost-border rounded-xl p-8 space-y-8 shadow-[0_20px_40px_rgba(26,28,28,0.04)]">
<!-- Identity Section -->
<div class="text-center space-y-2">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-lg bg-surface-container-low mb-4">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="architecture">architecture</span>
</div>
<h1 class="text-2xl font-semibold tracking-tight text-on-surface font-headline">Welcome back</h1>
<p class="text-secondary text-sm">Enter your email to sign in</p>
</div>
<!-- Form Section -->
<form class="space-y-4" onsubmit="return false;">
<div class="space-y-2">
<label class="text-xs font-medium uppercase tracking-widest text-secondary block" for="email">Email</label>
<input class="w-full bg-surface-container-lowest ghost-border rounded-lg px-4 py-3 text-sm focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-slate-400" id="email" placeholder="name@example.com" type="email"/>
</div>
<div class="space-y-2">
<div class="flex items-center justify-between">
<label class="text-xs font-medium uppercase tracking-widest text-secondary block" for="password">Password</label>
<a class="text-xs font-medium text-primary hover:text-on-primary-fixed-variant transition-colors" href="#">Forgot password?</a>
</div>
<input class="w-full bg-surface-container-lowest ghost-border rounded-lg px-4 py-3 text-sm focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-slate-400" id="password" placeholder="••••••••" type="password"/>
</div>
<button class="w-full bg-primary text-on-primary font-medium py-3 rounded-lg hover:bg-primary-container transition-all active:scale-95 flex items-center justify-center gap-2">
                    Sign In
                </button>
</form>
<!-- Divider -->
<div class="relative flex items-center gap-4">
<div class="flex-grow h-px bg-outline-variant opacity-20"></div>
<span class="text-[10px] uppercase tracking-[0.2em] text-slate-400 font-bold">OR CONTINUE WITH</span>
<div class="flex-grow h-px bg-outline-variant opacity-20"></div>
</div>
<!-- Alternative Sign In -->
<button class="w-full ghost-border bg-surface-container-lowest text-on-surface font-medium py-3 rounded-lg hover:bg-surface-container transition-all flex items-center justify-center gap-3">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                Sign in with Google
            </button>
</div>
<!-- Secondary Action Anchor -->
<p class="mt-8 text-sm text-secondary tracking-tight">
            Don't have an account? 
            <a class="text-primary font-semibold hover:underline underline-offset-4 transition-all" href="#">Sign up</a>
</p>
</main>
<!-- Footer Content Anchor -->
<footer class="fixed bottom-0 w-full flex flex-col md:flex-row justify-between items-center px-8 py-10 w-full max-w-7xl mx-auto opacity-60">
<span class="font-sans text-xs uppercase tracking-widest font-medium text-slate-400">© 2024 LinkArch. Built for Digital Architects.</span>
<div class="flex gap-8 mt-4 md:mt-0">
<a class="font-sans text-xs uppercase tracking-widest font-medium text-slate-400 hover:text-slate-900 transition-colors" href="#">Privacy</a>
<a class="font-sans text-xs uppercase tracking-widest font-medium text-slate-400 hover:text-slate-900 transition-colors" href="#">Terms</a>
<a class="font-sans text-xs uppercase tracking-widest font-medium text-slate-400 hover:text-slate-900 transition-colors" href="#">Support</a>
</div>
</footer>
<!-- Subtle Background Texture -->
<div class="fixed inset-0 pointer-events-none z-[-1] overflow-hidden">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[30%] h-[30%] bg-outline-variant/10 blur-[100px] rounded-full"></div>
</div>
</body></html>
