<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register | LinkArch</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "outline-variant": "#c0cab5",
                        "inverse-surface": "#2f3131",
                        "surface-tint": "#276c00",
                        "surface-container-high": "#e8e8e8",
                        "on-primary": "#ffffff",
                        "surface-container": "#eeeeee",
                        "secondary": "#5f5e61",
                        "on-error-container": "#93000a",
                        "tertiary-fixed-dim": "#c6c6c6",
                        "error-container": "#ffdad6",
                        "error": "#ba1a1a",
                        "surface-container-highest": "#e2e2e2",
                        "primary": "#276c00",
                        "inverse-on-surface": "#f1f1f1",
                        "secondary-container": "#e4e1e5",
                        "on-primary-fixed-variant": "#1c5200",
                        "surface": "#f9f9f9",
                        "secondary-fixed-dim": "#c8c6c9",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed": "#072100",
                        "surface-dim": "#dadada",
                        "on-surface-variant": "#404a3a",
                        "primary-fixed-dim": "#86db5d",
                        "secondary-fixed": "#e4e1e5",
                        "on-tertiary-fixed-variant": "#474747",
                        "primary-fixed": "#a1f876",
                        "on-secondary-fixed-variant": "#47464a",
                        "on-error": "#ffffff",
                        "background": "#f9f9f9",
                        "surface-variant": "#e2e2e2",
                        "surface-bright": "#f9f9f9",
                        "on-primary-container": "#0e3100",
                        "on-tertiary-fixed": "#1b1b1b",
                        "on-tertiary": "#ffffff",
                        "tertiary-container": "#919191",
                        "on-tertiary-container": "#2a2a2a",
                        "on-background": "#1a1c1c",
                        "inverse-primary": "#86db5d",
                        "primary-container": "#52a32b",
                        "on-secondary": "#ffffff",
                        "surface-container-low": "#f3f3f3",
                        "tertiary-fixed": "#e2e2e2",
                        "on-surface": "#1a1c1c",
                        "tertiary": "#5e5e5e",
                        "on-secondary-fixed": "#1b1b1e",
                        "outline": "#707a68",
                        "on-secondary-container": "#656467"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(192, 202, 181, 0.15);
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Top Navigation (Shell Implementation - Suppressed but keeping brand presence as per Transactional rule) -->
<header class="fixed top-0 w-full flex items-center justify-between px-6 py-8 max-w-7xl mx-auto w-full z-50">
<div class="text-xl font-bold tracking-tighter text-slate-900 dark:text-slate-50">
            LinkArch
        </div>
</header>
<main class="w-full max-w-md px-6 py-12">
<!-- Register Card -->
<div class="bg-surface-container-lowest glass-panel rounded-xl shadow-[0_20px_40px_rgba(26,28,28,0.04)] p-8 md:p-10 space-y-8">
<!-- Heading Section -->
<div class="space-y-2 text-center">
<div class="inline-flex items-center justify-center p-3 rounded-xl bg-surface-container-low text-primary mb-2">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">architecture</span>
</div>
<h1 class="text-2xl font-semibold tracking-tight text-on-surface">Create an account</h1>
<p class="text-secondary text-sm">Enter your details to get started</p>
</div>
<!-- Registration Form -->
<form action="#" class="space-y-5" onsubmit="return false;">
<!-- Full Name Field -->
<div class="space-y-1.5">
<label class="text-xs font-medium uppercase tracking-widest text-secondary ml-1" for="name">Full Name</label>
<input class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant/15 rounded-lg focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-secondary/50 text-sm" id="name" placeholder="John Doe" type="text"/>
</div>
<!-- Email Field -->
<div class="space-y-1.5">
<label class="text-xs font-medium uppercase tracking-widest text-secondary ml-1" for="email">Email</label>
<input class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant/15 rounded-lg focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-secondary/50 text-sm" id="email" placeholder="architect@linkarch.io" type="email"/>
</div>
<!-- Password Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="text-xs font-medium uppercase tracking-widest text-secondary ml-1" for="password">Password</label>
<input class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant/15 rounded-lg focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-secondary/50 text-sm" id="password" placeholder="••••••••" type="password"/>
</div>
<div class="space-y-1.5">
<label class="text-xs font-medium uppercase tracking-widest text-secondary ml-1" for="confirm_password">Confirm</label>
<input class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant/15 rounded-lg focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-secondary/50 text-sm" id="confirm_password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start space-x-3 pt-1">
<div class="flex items-center h-5">
<input class="h-4 w-4 rounded border-outline-variant/30 text-primary focus:ring-primary-container bg-surface" id="terms" name="terms" type="checkbox"/>
</div>
<label class="text-xs text-secondary leading-tight" for="terms">
                        I agree to the <a class="text-primary hover:underline underline-offset-2" href="#">Terms of Service</a> and <a class="text-primary hover:underline underline-offset-2" href="#">Privacy Policy</a>.
                    </label>
</div>
<!-- Actions -->
<div class="space-y-4 pt-2">
<button class="w-full bg-primary text-on-primary font-medium py-3 rounded-lg hover:opacity-90 active:scale-[0.98] transition-all shadow-sm flex items-center justify-center space-x-2" type="submit">
<span>Create Account</span>
</button>
<div class="relative flex items-center justify-center py-2">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/15"></div>
</div>
<span class="relative bg-surface-container-lowest px-4 text-[10px] uppercase tracking-widest text-secondary/60">Or continue with</span>
</div>
<button class="w-full bg-surface-container-low border border-outline-variant/20 text-on-surface font-medium py-3 rounded-lg hover:bg-surface-container-high active:scale-[0.98] transition-all flex items-center justify-center space-x-3" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-sm">Sign up with Google</span>
</button>
</div>
</form>
</div>
<!-- Footer Link -->
<p class="mt-8 text-center text-sm text-secondary">
            Already have an account? 
            <a class="text-primary font-semibold hover:underline underline-offset-4 ml-1" href="#">Sign in</a>
</p>
</main>
<!-- Footer (Shell Implementation) -->
<footer class="fixed bottom-0 w-full flex flex-col md:flex-row justify-between items-center px-8 py-10 w-full max-w-7xl mx-auto opacity-60">
<div class="font-sans text-xs uppercase tracking-widest font-medium text-slate-400">
            © 2024 LinkArch. Built for Digital Architects.
        </div>
<div class="flex gap-6 mt-4 md:mt-0">
<a class="font-sans text-xs uppercase tracking-widest font-medium text-slate-400 hover:text-slate-600 transition-colors" href="#">Privacy</a>
<a class="font-sans text-xs uppercase tracking-widest font-medium text-slate-400 hover:text-slate-600 transition-colors" href="#">Terms</a>
<a class="font-sans text-xs uppercase tracking-widest font-medium text-slate-400 hover:text-slate-600 transition-colors" href="#">Support</a>
</div>
</footer>
</body></html>
